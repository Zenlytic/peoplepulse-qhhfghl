type: view
name: chart
model_name: zenlytic_managed
sql_table_name: chart
fields:
  - name: Not_indexed
    field_type: dimension
    type: number
    sql: ${TABLE}."NOT_INDEXED"
    searchable: true

  - name: Indexed
    field_type: dimension
    type: number
    sql: ${TABLE}."INDEXED"
    searchable: true

  - name: Impressions
    field_type: dimension
    type: number
    sql: ${TABLE}."IMPRESSIONS"
    searchable: true

  - name: Date
    field_type: dimension_group
    type: time
    datatype: timestamp
    sql: ${TABLE}."DATE"
    timeframes:
      - date
      - week
      - month
      - quarter
      - year
      - day_of_year
      - week_of_year
      - month_of_year
