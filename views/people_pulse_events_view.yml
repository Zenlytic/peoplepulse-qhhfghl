version: 1
type: view
name: events
description: >-
  The user id is a uuid for a unique person, and the customer id is the id of
  that person that connects to a known customer. These are events with the
  product.
model_name: peoplepulse_model
sql_table_name: DEMO.DEMO_PROD_PEOPLE_PULSE.PEOPLE_PULSE_EVENTS
default_date: event_time
identifiers:
  - name: event_id
    type: primary
    sql: ${event_id}
  - name: user_id
    type: foreign
    sql: ${user_id}
  - name: customer_id
    type: foreign
    sql: ${customer_id}
fields:
  - name: user_id
    field_type: dimension
    type: number
    sql: ${TABLE}."USER_ID"

  - name: event_id
    field_type: dimension
    type: number
    sql: ${TABLE}."EVENT_ID"
    hidden: true
    primary_key: true

  - name: customer_id
    field_type: dimension
    type: number
    sql: ${TABLE}."CUSTOMER_ID"

  - name: browser
    field_type: dimension
    type: string
    sql: ${TABLE}."BROWSER"
    searchable: true

  - name: event_type
    field_type: dimension
    type: string
    sql: ${TABLE}."EVENT_TYPE"
    searchable: true

  - name: os
    field_type: dimension
    type: string
    sql: ${TABLE}."OS"
    searchable: true

  - name: device_type
    field_type: dimension
    type: string
    sql: ${TABLE}."DEVICE_TYPE"
    searchable: true

  - name: event_time
    field_type: dimension_group
    type: time
    datatype: timestamp
    timeframes:
      - raw
      - date
      - day_of_year
      - week
      - week_of_year
      - month
      - month_of_year
      - quarter
      - fiscal_month
      - fiscal_quarter
      - fiscal_quarter_of_year
      - fiscal_year
      - year
    sql: ${TABLE}."EVENT_TIME"

  - name: total_events
    field_type: measure
    type: count
    description: The total number of events recorded
    sql: ${event_id}
    value_format_name: decimal_0

  - name: unique_customers
    field_type: measure
    type: count_distinct
    description: The count of unique customers associated with the events
    sql: ${customer_id}
    value_format_name: decimal_0

  - name: unique_users
    field_type: measure
    type: count_distinct
    description: The count of unique users (including anonymous) who triggered events
    sql: ${user_id}
    value_format_name: decimal_0

  - name: events_per_customer
    field_type: measure
    type: number
    description: Average number of events per customer (engagement intensity metric)
    sql: ${total_events} / NULLIF(${unique_customers}, 0)
    value_format_name: decimal_1

  - name: events_per_user
    field_type: measure
    type: number
    description: Average number of events per user (engagement intensity metric)
    sql: ${total_events} / NULLIF(${unique_users}, 0)
    value_format_name: decimal_1

  - name: mobile_events
    field_type: measure
    type: count
    description: Number of events from mobile devices
    sql: ${event_id}
    filters:
      - field: device_type
        value: Mobile
    value_format_name: decimal_0

  - name: desktop_events
    field_type: measure
    type: count
    description: Number of events from desktop devices
    sql: ${event_id}
    filters:
      - field: device_type
        value: Desktop
    value_format_name: decimal_0

  - name: mobile_adoption_rate
    field_type: measure
    type: number
    description: Percentage of events occurring on mobile devices
    sql: ${mobile_events} / NULLIF(${total_events}, 0)
    value_format_name: percent_1

  - name: daily_active_users
    field_type: measure
    type: count_distinct
    description: >-
      Count of distinct users active on a given day. 
      Use with event_time_date dimension for daily DAU tracking.
    sql: ${user_id}
    value_format_name: decimal_0

  - name: daily_active_customers
    field_type: measure
    type: count_distinct
    description: >-
      Count of distinct customers active on a given day. 
      Use with event_time_date dimension for daily active customer tracking.
    sql: ${customer_id}
    value_format_name: decimal_0

  - name: power_users
    field_type: measure
    type: count_distinct
    description: >-
      Users with more than 50 events (power user threshold). 
      Note: This is a simplified metric; for accurate power user analysis, use a window function.
    sql: CASE WHEN COUNT(${event_id}) > 50 THEN ${user_id} END
    value_format_name: decimal_0
