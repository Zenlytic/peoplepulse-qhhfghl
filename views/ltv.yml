version: 1
type: view
name: ltv
model_name: peoplepulse_model
sql_table_name: DEMO."DEMO_PROD"."LTV"
fields:
- name: n_cumulative_orders
  sql: ${TABLE}."N_CUMULATIVE_ORDERS"
  field_type: dimension
  type: number
- name: n_customers_in_month
  sql: ${TABLE}."N_CUSTOMERS_IN_MONTH"
  field_type: dimension
  type: number
- name: n_orders_in_month
  sql: ${TABLE}."N_ORDERS_IN_MONTH"
  field_type: dimension
  type: number
- name: date_month
  sql: ${TABLE}."DATE_MONTH"
  field_type: dimension_group
  type: time
  timeframes:
  - raw
  - date
  - day_of_year
  - week
  - week_of_year
  - month
  - month_of_year
  - quarter
  - year
  datatype: date
- name: customer_id
  sql: ${TABLE}."CUSTOMER_ID"
  field_type: dimension
  type: number
- name: gross_sales
  sql: ${TABLE}."GROSS_SALES"
  field_type: dimension
  type: number
default_date: date_month
